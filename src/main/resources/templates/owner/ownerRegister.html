<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Registration | Smart PS Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {'neon-cyan':'#00ffff','neon-purple':'#8b5cf6','dark-bg':'#0a0a0a','dark-secondary':'#1a1a1a'},
                }
            }
        }
    </script>
    <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body class="bg-dark-bg text-white">
<div class="min-h-screen flex items-center justify-center p-4 hero-bg ">
    <div class="w-full max-w-md p-8 space-y-8 bg-dark-secondary/80 backdrop-blur-sm border border-neon-cyan/20 rounded-2xl shadow-2xl shadow-neon-cyan/10">
        <div class="text-center">
            <h1 class="font-orbitron font-bold text-3xl text-glow text-neon-cyan">Create Owner Account</h1>
        </div>
        <form class="space-y-4" th:action="@{/register}" th:object="${ownerRegistrationDto}" method="post">
            <div>
                <label  class="block text-sm font-semibold text-gray-300">Full Name</label>
                <input type="text" th:field="*{name}" required class="mt-1 w-full px-4 py-3 bg-dark-bg border border-neon-cyan/30 rounded-lg focus:outline-none focus:border-neon-cyan">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-300">Email Address</label>
                <input type="email" th:field="*{email}" required class="mt-1 w-full px-4 py-3 bg-dark-bg border border-neon-cyan/30 rounded-lg focus:outline-none focus:border-neon-cyan">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-300">Phone Number</label>
                <input type="tel" th:field="*{phone}" required class="mt-1 w-full px-4 py-3 bg-dark-bg border border-neon-cyan/30 rounded-lg focus:outline-none focus:border-neon-cyan">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-300">Password</label>
                <input type="password" th:field="*{password}" required class="mt-1 w-full px-4 py-3 bg-dark-bg border border-neon-cyan/30 rounded-lg focus:outline-none focus:border-neon-cyan">
            </div>
            <div>
                <button type="submit" class="w-full btn-gaming py-3 rounded-lg font-semibold text-white text-lg">Create Account</button>
            </div>
            <div class="text-center text-gray-400">
                Already have an account? <a th:href="@{/login}" class="font-medium text-neon-cyan hover:underline">Sign in</a>
            </div>
        </form>
    </div>
</div>

<script th:src="@{'/js/script.js'}" defer></script>
</body>
</html>
