<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Cafe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {'neon-cyan':'#00ffff','neon-purple':'#8b5cf6','dark-bg':'#0a0a0a','dark-secondary':'#1a1a1a'},
                }
            }
        }
    </script>
    <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body class="bg-dark-bg text-white flex pt-24">
<div th:replace="~{fragments/owner-navbar :: ownerNavbar('cafes')}"></div>
<aside class="w-64 bg-dark-secondary h-screen sticky top-0 border-r border-neon-cyan/20 flex flex-col">
    <div class="p-6 border-b border-neon-cyan/20"><h1 class="font-orbitron font-bold text-xl text-neon-cyan text-center">OWNER PANEL</h1></div>
    <nav class="p-4 space-y-2 flex-grow">
        <a th:href="@{/owner/}" class="block py-3 px-4 rounded-lg hover:bg-neon-cyan/10 sidebar-link font-semibold">Dashboard</a>
        <a th:href="@{/owner/cafes}" class="block py-3 px-4 rounded-lg sidebar-link active font-semibold">Manage Cafes</a>
    </nav>
    <div class="p-4 border-t border-neon-cyan/20">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="w-full text-center py-3 px-4 rounded-lg bg-red-500/20 hover:bg-red-500/40 text-red-300 font-semibold">Logout</button>
        </form>
    </div>
</aside>
<main class="flex-1 p-8">
    <div class="mb-6 flex flex-wrap gap-3 rounded-xl border border-neon-cyan/20 bg-dark-secondary p-4">
        <a th:href="@{/owner/}" class="rounded-lg bg-dark-bg px-4 py-2 font-semibold text-gray-200 hover:text-neon-cyan">Dashboard</a>
        <a th:href="@{/owner/cafes}" class="rounded-lg bg-dark-bg px-4 py-2 font-semibold text-gray-200 hover:text-neon-cyan">Manage Cafes</a>
        <a th:href="@{/owner/editCafe/{cafeId}(cafeId=${cafeId})}" class="rounded-lg bg-neon-cyan/10 px-4 py-2 font-semibold text-neon-cyan">Edit Cafe</a>
    </div>
    <div class="mb-8 flex items-center justify-between">
        <h1 class="font-orbitron text-4xl font-bold text-neon-purple">Edit Cafe</h1>
        <a th:href="@{/owner/cafes}" class="btn-gaming rounded-lg px-6 py-3 font-semibold text-dark-bg">Back</a>
    </div>
    <form th:action="@{/owner/editCafe/{cafeId}(cafeId=${cafeId})}" th:object="${cafeAdditionDto}" method="post" enctype="multipart/form-data" class="max-w-3xl space-y-6 rounded-xl border border-neon-purple/20 bg-dark-secondary p-8">
        <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
            <div>
                <label for="name" class="block text-gray-300">Cafe Name</label>
                <input type="text" id="name" th:field="*{name}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2 focus:border-neon-cyan focus:outline-none" required>
            </div>
            <div>
                <label for="hourlyRate" class="block text-gray-300">Hourly Rate</label>
                <input type="number" id="hourlyRate" step="0.01" th:field="*{hourlyRate}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2" required>
            </div>
        </div>
        <div>
            <label for="address" class="block text-gray-300">Address</label>
            <input type="text" id="address" th:field="*{address}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2" required>
        </div>
        <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
            <div>
                <label for="openTime" class="block text-gray-300">Opening Time</label>
                <input type="time" id="openTime" th:field="*{openTime}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2" required>
            </div>
            <div>
                <label for="closeTime" class="block text-gray-300">Closing Time</label>
                <input type="time" id="closeTime" th:field="*{closeTime}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2" required>
            </div>
        </div>
        <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
            <div>
                <label class="block text-gray-300">Current Image</label>
                <div class="mt-2 overflow-hidden rounded-xl border border-neon-cyan/20 bg-dark-bg p-3">
                    <img th:src="${(cafeAdditionDto.cafeImage != null and !#strings.isEmpty(cafeAdditionDto.cafeImage) and cafeAdditionDto.cafeImage != '.') ? cafeAdditionDto.cafeImage : '/images/cafe1.jpeg'}"
                         alt="Cafe image"
                         class="h-48 w-full rounded-lg object-cover">
                </div>
            </div>
            <div>
                <label for="cafeImg" class="block text-gray-300">Replace Image</label>
                <input type="file" id="cafeImg" th:field="*{cafeImageFile}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2">
                <p class="mt-2 text-sm text-gray-400">Leave empty to keep the current image.</p>
            </div>
        </div>
        <div class="flex gap-4">
            <button type="submit" class="btn-gaming w-full rounded-lg py-3 text-lg font-semibold text-dark-bg">Save Changes</button>
        </div>
    </form>
</main>
<script th:src="@{'/js/script.js'}" defer></script>
</body>
</html>
