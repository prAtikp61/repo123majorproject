<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login | Smart PS Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-cyan': '#00ffff',
                        'neon-purple': '#8b5cf6',
                        'neon-green': '#10b981',
                        'dark-bg': '#0a0a0a',
                        'dark-secondary': '#1a1a1a',
                        'dark-tertiary': '#2a2a2a'
                    },
                    animation: {
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite'
                    },
                    keyframes: {
                        glow: {
                            '0%': { boxShadow: '0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 15px #00ffff' },
                            '100%': { boxShadow: '0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' }
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body class="bg-dark-bg text-white font-rajdhani">
<nav class="fixed top-0 w-full bg-dark-secondary/90 backdrop-blur-md border-b border-neon-cyan/20 z-50">
    <div class="container mx-auto px-6 py-4">
        <div class="flex items-center justify-between">
            <a th:href="@{/landing}" class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-gradient-to-r from-neon-purple to-neon-cyan rounded-lg flex items-center justify-center animate-glow">
                    <span class="font-orbitron font-bold text-lg">PS</span>
                </div>
                <span class="font-orbitron font-bold text-xl text-glow-1 text-neon-cyan">Smart PS Lounge</span>
            </a>

            <div class="hidden md:flex items-center space-x-8">
                <a href="/landing#home" class="hover:text-neon-cyan transition-colors duration-300">Home</a>
                <a href="/landing#gamers" class="hover:text-neon-cyan transition-colors duration-300">For Gamers</a>
                <a href="/landing#owners" class="hover:text-neon-cyan transition-colors duration-300">For Owners</a>
                <a href="/landing#analytics" class="hover:text-neon-cyan transition-colors duration-300">Analytics</a>
            </div>

            <div class="flex items-center space-x-4">
                <a th:href="@{/user/findcafe}" class="btn-gaming px-6 py-2 text-white font-semibold rounded-lg">
                    Book Now
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="min-h-screen flex items-center justify-center p-4 hero-bg pt-28">
    <div class="w-full max-w-md p-8 space-y-8 bg-dark-secondary/80 backdrop-blur-sm border border-neon-cyan/20 rounded-2xl shadow-2xl shadow-neon-cyan/10">
        <div class="text-center">
            <h1 class="font-orbitron font-bold text-3xl text-glow text-neon-cyan">Owner Portal</h1>
        </div>
        <form class="space-y-6" th:action="@{'/login'}" method="post">
            <div>
                <label for="username" class="block text-sm font-semibold text-gray-300">Email</label>
                <input id="username" name="username" type="email" required class="mt-2 w-full px-4 py-3 bg-dark-bg border border-neon-cyan/30 rounded-lg focus:outline-none focus:border-neon-cyan">
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-300">Password</label>
                <input id="password" name="password" type="password" required class="mt-2 w-full px-4 py-3 bg-dark-bg border border-neon-cyan/30 rounded-lg focus:outline-none focus:border-neon-cyan">
            </div>
            <div th:if="${param.error}" class="text-center p-3 bg-red-500/20 text-red-300 border border-red-500/30 rounded-lg">
                Invalid email or password.
            </div>
            <div th:if="${param.logout}" class="text-center p-3 bg-neon-green/20 text-neon-green border border-neon-green/30 rounded-lg">
                You have been logged out.
            </div>
            <div>
                <button type="submit" class="w-full btn-gaming py-3 rounded-lg font-semibold text-white text-lg">Sign In</button>
            </div>
            <div class="text-center text-gray-400">
                Don't have an account? <a th:href="@{'/register'}" class="font-medium text-neon-cyan hover:underline">Register here</a>
            </div>
        </form>
    </div>
</div>

<script th:src="@{'/js/script.js'}" defer></script>
</body>
</html>
