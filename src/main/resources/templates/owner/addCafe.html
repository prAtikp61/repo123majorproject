<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Cafe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {'neon-cyan':'#00ffff','neon-purple':'#8b5cf6','dark-bg':'#0a0a0a','dark-secondary':'#1a1a1a'},
                }
            }
        }
    </script>
    <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body class="bg-dark-bg text-white flex">
<aside class="w-64 bg-dark-secondary h-screen sticky top-0 border-r border-neon-cyan/20 flex flex-col">
    <div class="p-6 border-b border-neon-cyan/20"><h1 class="font-orbitron font-bold text-xl text-neon-cyan text-center">OWNER PANEL</h1></div>
    <nav class="p-4 space-y-2 flex-grow">
        <a th:href="@{/owner/}" class="block py-3 px-4 rounded-lg hover:bg-neon-cyan/10 sidebar-link font-semibold">📈 Dashboard</a>
        <a th:href="@{/owner/cafes}" class="block py-3 px-4 rounded-lg sidebar-link active font-semibold">☕ Manage Cafes</a>
    </nav>
    <div class="p-4 border-t border-neon-cyan/20">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="w-full text-center py-3 px-4 rounded-lg bg-red-500/20 hover:bg-red-500/40 text-red-300 font-semibold">Logout</button>
        </form>
    </div>
</aside>
<main class="flex-1 p-8">
    <h1 class="font-orbitron text-4xl font-bold text-neon-purple mb-8">Add New Cafe</h1>
    <form th:action="@{/owner/addCafe}" th:object="${cafeAdditionDto}" method="post" enctype="multipart/form-data" class="max-w-2xl mx-auto bg-dark-secondary p-8 rounded-xl border border-neon-purple/20 space-y-6">
        <div>
            <label for="name" class="block text-gray-300">Cafe Name</label>
            <input type="text" id="name" th:field="*{name}" class="w-full mt-2 px-4 py-2 bg-dark-bg border border-neon-cyan/30 rounded-lg focus:outline-none focus:border-neon-cyan" required>
        </div>
        <div>
            <label for="address" class="block text-gray-300">Address</label>
            <input type="text" id="address" th:field="*{address}" class="w-full mt-2 px-4 py-2 bg-dark-bg border border-neon-cyan/30 rounded-lg" required>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="openTime" class="block text-gray-300">Opening Time</label>
                <input type="time" id="openTime" th:field="*{openTime}" class="w-full mt-2 px-4 py-2 bg-dark-bg border border-neon-cyan/30 rounded-lg" required>
            </div>
            <div>
                <label for="closeTime" class="block text-gray-300">Closing Time</label>
                <input type="time" id="closeTime" th:field="*{closeTime}" class="w-full mt-2 px-4 py-2 bg-dark-bg border border-neon-cyan/30 rounded-lg" required>
            </div>
        </div>
        <div>
            <label for="hourlyRate" class="block text-gray-300">Default Hourly Rate (for display)</label>
            <input type="number" id="hourlyRate" step="0.01" th:field="*{hourlyRate}" class="w-full mt-2 px-4 py-2 bg-dark-bg border border-neon-cyan/30 rounded-lg" required>
        </div>
        <div>
            <label for="hourlyRate" class="block text-gray-300">Add Cafe Image</label>
            <input type="file" id="cafeImg" step="0.01" th:field="*{cafeImageFile}" class="w-full mt-2 px-4 py-2 bg-dark-bg border border-neon-cyan/30 rounded-lg" required>
        </div>
        <div>
            <button type="submit" class="w-full btn-gaming py-3 rounded-lg font-semibold text-dark-bg text-lg">Add Cafe</button>
        </div>
    </form>
</main>

<script th:src="@{'/js/script.js'}" defer></script>
</body>
</html>
