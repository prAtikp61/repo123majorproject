<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New PC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {'neon-cyan':'#00ffff','neon-purple':'#8b5cf6','dark-bg':'#0a0a0a','dark-secondary':'#1a1a1a'},
                }
            }
        }
    </script>
    <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body class="bg-dark-bg text-white flex">
<aside class="w-64 bg-dark-secondary h-screen sticky top-0 border-r border-neon-cyan/20 flex flex-col">
    <div class="p-6 border-b border-neon-cyan/20"><h1 class="font-orbitron font-bold text-xl text-neon-cyan text-center">OWNER PANEL</h1></div>
    <nav class="p-4 space-y-2 flex-grow">
        <a th:href="@{/owner/}" class="block py-3 px-4 rounded-lg hover:bg-neon-cyan/10 sidebar-link font-semibold">📈 Dashboard</a>
        <a th:href="@{/owner/cafes}" class="block py-3 px-4 rounded-lg sidebar-link active font-semibold">☕ Manage Cafes</a>
    </nav>
    <div class="p-4 border-t border-neon-cyan/20">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="w-full text-center py-3 px-4 rounded-lg bg-red-500/20 hover:bg-red-500/40 text-red-300 font-semibold">Logout</button>
        </form>
    </div>
</aside>
<main class="flex-1 p-8">
    <div class="mb-6 flex flex-wrap gap-3 rounded-xl border border-neon-cyan/20 bg-dark-secondary p-4">
        <a th:href="@{/owner/}" class="rounded-lg bg-dark-bg px-4 py-2 font-semibold text-gray-200 hover:text-neon-cyan">Dashboard</a>
        <a th:href="@{/owner/cafes}" class="rounded-lg bg-dark-bg px-4 py-2 font-semibold text-gray-200 hover:text-neon-cyan">Manage Cafes</a>
        <a th:href="@{/owner/PCs/{cafeId}(cafeId=${cafeId})}" class="rounded-lg bg-dark-bg px-4 py-2 font-semibold text-gray-200 hover:text-neon-cyan">Manage PCs</a>
        <a th:href="@{/owner/addSeat/{cafeId}(cafeId=${cafeId})}" class="rounded-lg bg-neon-cyan/10 px-4 py-2 font-semibold text-neon-cyan">Add PC</a>
    </div>
    <h1 class="font-orbitron text-4xl font-bold text-neon-purple mb-8">Add New PC</h1>
    <form th:action="@{/owner/addSeat/{cafeId}(cafeId=${cafeId})}" th:object="${pcDto}" method="post" class="max-w-xl mx-auto bg-dark-secondary p-8 rounded-xl border border-neon-purple/20 space-y-6">
        <div>
            <label for="seatNumber" class="block text-gray-300">Seat Number</label>
            <input type="number" id="seatNumber" th:field="*{seatNumber}" class="w-full mt-2 px-4 py-2 bg-dark-bg border border-neon-cyan/30 rounded-lg focus:outline-none focus:border-neon-cyan" required>
        </div>
        <div>
            <label for="configuration" class="block text-gray-300">Configuration (e.g., RTX 4080, i9-13900K, 32GB RAM)</label>
            <input type="text" id="configuration" th:field="*{configuration}" class="w-full mt-2 px-4 py-2 bg-dark-bg border border-neon-cyan/30 rounded-lg" required>
        </div>
        <input type="hidden" th:field="*{available}" th:value="'true'" />
        <div>
            <button type="submit" class="w-full btn-gaming py-3 rounded-lg font-semibold text-dark-bg text-lg">Add PC</button>
        </div>
    </form>
</main>

<script th:src="@{'/js/script.js'}" defer></script>
</body>
</html>
