<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Cafes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {'neon-cyan':'#00ffff','neon-purple':'#8b5cf6','neon-green':'#10b981','dark-bg':'#0a0a0a','dark-secondary':'#1a1a1a'},
                }
            }
        }
    </script>
    <link rel="stylesheet" th:href="@{'/css/style.css'}">
    <style>
        .analytics-dropdown {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .analytics-dropdown.show {
            max-height: 320px;
        }

        .chevron {
            transition: transform 0.3s ease;
            display: inline-block;
            font-size: 0.8rem;
        }

        .chevron.rotate {
            transform: rotate(90deg);
        }
    </style>
</head>
<body class="bg-dark-bg text-white flex">
<aside class="w-64 bg-dark-secondary h-screen sticky top-0 border-r border-neon-cyan/20 flex flex-col">
    <div class="p-6 border-b border-neon-cyan/20"><h1 class="font-orbitron font-bold text-xl text-neon-cyan text-center">OWNER PANEL</h1></div>
    <nav class="p-4 space-y-2 flex-grow">
        <a th:href="@{/owner/}" class="block py-3 px-4 rounded-lg hover:bg-neon-cyan/10 sidebar-link font-semibold">Dashboard</a>
        <a th:href="@{/owner/cafes}" class="block py-3 px-4 rounded-lg sidebar-link active font-semibold">Manage Cafes</a>
        <div class="analytics-section">
            <div class="block py-3 px-4 rounded-lg hover:bg-neon-cyan/10 sidebar-link font-semibold cursor-pointer" onclick="toggleAnalytics()">
                Analytics
                <span class="chevron float-right mt-1">▶</span>
            </div>
            <div id="analyticsDropdown" class="analytics-dropdown ml-4">
                <div th:if="${cafes != null and !#lists.isEmpty(cafes)}">
                    <div th:each="cafe : ${cafes}">
                        <a th:href="@{/owner/analytics/popular-games/{cafeId}(cafeId=${cafe.id})}" class="block py-2 px-4 rounded-lg hover:bg-neon-cyan/10 text-gray-300 hover:text-white font-medium text-sm">
                            Games: <span th:text="${cafe.name}">Cafe Name</span>
                        </a>
                        <a th:href="@{/owner/analytics/monthly-bookings/{cafeId}(cafeId=${cafe.id})}" class="block py-2 px-4 rounded-lg hover:bg-neon-cyan/10 text-gray-300 hover:text-white font-medium text-sm">
                            Bookings: <span th:text="${cafe.name}">Cafe Name</span>
                        </a>
                    </div>
                </div>
                <span th:if="${cafes == null or #lists.isEmpty(cafes)}" class="block py-2 px-4 text-gray-500 font-medium">
                    Add a cafe to view analytics
                </span>
            </div>
        </div>
    </nav>
    <div class="p-4 border-t border-neon-cyan/20">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="w-full text-center py-3 px-4 rounded-lg bg-red-500/20 hover:bg-red-500/40 text-red-300 font-semibold">Logout</button>
        </form>
    </div>
</aside>

<main class="flex-1 p-8">
    <div class="mb-6 flex flex-wrap gap-3 rounded-xl border border-neon-cyan/20 bg-dark-secondary p-4">
        <a th:href="@{/owner/}" class="rounded-lg bg-dark-bg px-4 py-2 font-semibold text-gray-200 hover:text-neon-cyan">Dashboard</a>
        <a th:href="@{/owner/cafes}" class="rounded-lg bg-neon-cyan/10 px-4 py-2 font-semibold text-neon-cyan">Manage Cafes</a>
        <a th:href="@{/owner/addCafe}" class="rounded-lg bg-dark-bg px-4 py-2 font-semibold text-gray-200 hover:text-neon-cyan">Add Cafe</a>
    </div>
    <div class="flex justify-between items-center mb-8">
        <h1 class="font-orbitron text-4xl font-bold text-neon-purple">Manage Your Cafes</h1>
        <a th:href="@{/owner/addCafe}" class="btn-gaming px-6 py-3 rounded-lg font-semibold text-dark-bg">Add New Cafe</a>
    </div>

    <div class="bg-dark-secondary border border-neon-cyan/20 rounded-xl overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-dark-tertiary/50">
            <tr>
                <th class="p-4 font-orbitron">Cafe Name</th>
                <th class="p-4 font-orbitron">Address</th>
                <th class="p-4 font-orbitron">Timings</th>
                <th class="p-4 font-orbitron">Rate</th>
                <th class="p-4 font-orbitron">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cafe : ${cafes}" class="border-t border-neon-cyan/10">
                <td class="p-4" th:text="${cafe.name}"></td>
                <td class="p-4" th:text="${cafe.address}"></td>
                <td class="p-4" th:text="${cafe.openTime} + ' - ' + ${cafe.closeTime}"></td>
                <td class="p-4" th:text="'₹' + ${cafe.hourlyRate}"></td>
                <td class="p-4">
                    <div class="flex flex-wrap gap-3">
                        <a th:href="@{/owner/PCs/{cafeId}(cafeId=${cafe.id})}" class="text-neon-cyan hover:underline font-semibold">View PCs</a>
                        <a th:href="@{/owner/pricing/{cafeId}(cafeId=${cafe.id})}" class="text-yellow-300 hover:underline font-semibold">Pricing</a>
                        <a th:href="@{/owner/editCafe/{cafeId}(cafeId=${cafe.id})}" class="text-blue-400 hover:underline font-semibold">Edit</a>
                        <form th:action="@{/owner/deleteCafe/{cafeId}(cafeId=${cafe.id})}" method="post" onsubmit="return confirm('Delete this cafe? This only works when there is no booking history for it.');">
                            <button type="submit" class="text-red-400 hover:underline font-semibold">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(cafes)}">
                <td colspan="5" class="p-6 text-center text-gray-500">No cafes added yet.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script>
    function toggleAnalytics() {
        const dropdown = document.getElementById('analyticsDropdown');
        const chevron = document.querySelector('.chevron');
        dropdown.classList.toggle('show');
        chevron.classList.toggle('rotate');
    }
</script>
<script th:src="@{'/js/script.js'}" defer></script>
</body>
</html>
