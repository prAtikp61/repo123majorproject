<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {'neon-cyan':'#00ffff','neon-purple':'#8b5cf6','neon-green':'#10b981','dark-bg':'#0a0a0a','dark-secondary':'#1a1a1a'},
                }
            }
        }
    </script>
    <link rel="stylesheet" th:href="@{'/css/style.css'}">
    <style>
        .analytics-dropdown {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .analytics-dropdown.show {
            max-height: 200px; /* Increased max-height */
        }

        .chevron {
            transition: transform 0.3s ease;
            display: inline-block;
            font-size: 0.8rem;
        }

        .chevron.rotate {
            transform: rotate(90deg);
        }
    </style>
</head>
<body class="bg-dark-bg text-white flex">

<aside class="w-64 bg-dark-secondary h-screen sticky top-0 border-r border-neon-cyan/20 flex flex-col">
    <div class="p-6 border-b border-neon-cyan/20">
        <h1 class="font-orbitron font-bold text-xl text-neon-cyan text-center">OWNER PANEL</h1>
    </div>
    <nav class="p-4 space-y-2 flex-grow">
        <a th:href="@{/owner/}" class="block py-3 px-4 rounded-lg sidebar-link active font-semibold" onclick="closeAnalytics()">📈 Dashboard</a>
        <a th:href="@{/owner/cafes}" class="block py-3 px-4 rounded-lg hover:bg-neon-cyan/10 sidebar-link font-semibold" onclick="closeAnalytics()">☕ Manage Cafes</a>

        <div class="analytics-section">
            <div class="block py-3 px-4 rounded-lg hover:bg-neon-cyan/10 sidebar-link font-semibold cursor-pointer" onclick="toggleAnalytics()">
                📊 Analytics
                <span class="chevron float-right mt-1">▶</span>
            </div>

            <div id="analyticsDropdown" class="analytics-dropdown ml-4">
                <div th:if="${cafes != null and !#lists.isEmpty(cafes)}">
                    <div th:each="cafe : ${cafes}">
                        <a th:href="@{/owner/analytics/popular-games/{cafeId}(cafeId=${cafe.id})}"
                           class="block py-2 px-4 rounded-lg hover:bg-neon-cyan/10 text-gray-300 hover:text-white font-medium text-sm">
                            🎮 <span th:text="${cafe.name}">Cafe Name</span> - Games
                        </a>
                        <a th:href="@{/owner/analytics/monthly-bookings/{cafeId}(cafeId=${cafe.id})}"
                           class="block py-2 px-4 rounded-lg hover:bg-neon-cyan/10 text-gray-300 hover:text-white font-medium text-sm">
                            📈 <span th:text="${cafe.name}">Cafe Name</span> - Bookings
                        </a>
                    </div>
                </div>

                <div th:if="${cafes == null or #lists.isEmpty(cafes)}">
                    <span class="block py-2 px-4 text-gray-500 font-medium">
                        Add a cafe to view analytics
                    </span>
                </div>
            </div>
        </div>
    </nav>
    <div class="p-4 border-t border-neon-cyan/20">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="w-full text-center py-3 px-4 rounded-lg bg-red-500/20 hover:bg-red-500/40 text-red-300 font-semibold">Logout</button>
        </form>
    </div>
</aside>

<main class="flex-1 p-8">
    <h1 class="font-orbitron text-4xl font-bold text-neon-purple mb-8">Dashboard</h1>
    <div class="mb-8">
        <h2 class="font-orbitron text-2xl font-bold text-neon-cyan mb-4">Your Cafes</h2>
        <div th:if="${#lists.isEmpty(cafes)}" class="bg-dark-secondary p-6 rounded-xl border border-neon-purple/20 text-center">
            <p class="text-gray-400 mb-4">You haven't added any cafes yet.</p>
            <a th:href="@{/owner/addCafe}" class="inline-block bg-neon-purple hover:bg-neon-purple/80 px-6 py-2 rounded-lg font-semibold">Add Your First Cafe</a>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" th:unless="${#lists.isEmpty(cafes)}">
            <div th:each="cafe : ${cafes}" class="bg-dark-secondary p-6 rounded-xl border border-neon-cyan/20">
                <h3 class="text-xl font-bold font-orbitron text-neon-cyan" th:text="${cafe.name}">Cafe Name</h3>
                <p class="text-gray-400" th:text="${cafe.address}">Cafe Address</p>
                <a th:href="@{/owner/PCs/{cafeId}(cafeId=${cafe.id})}" class="text-neon-green hover:underline mt-4 inline-block font-semibold">Manage PCs &raquo;</a>
            </div>
        </div>
    </div>
</main>

<script>
    function toggleAnalytics() {
        const dropdown = document.getElementById('analyticsDropdown');
        const chevron = document.querySelector('.chevron');
        
        dropdown.classList.toggle('show');
        chevron.classList.toggle('rotate');

    }
    
    function closeAnalytics() {
        const dropdown = document.getElementById('analyticsDropdown');
        const chevron = document.querySelector('.chevron');
        
        dropdown.classList.remove('show');
        chevron.classList.remove('rotate');
    }
</script>

<script th:src="@{'/js/script.js'}" defer></script>
</body>
</html>
