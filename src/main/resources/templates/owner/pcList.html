<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage PCs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {'neon-cyan':'#00ffff','neon-purple':'#8b5cf6','neon-green':'#10b981','dark-bg':'#0a0a0a','dark-secondary':'#1a1a1a','dark-tertiary':'#2a2a2a'},
                }
            }
        }
    </script>
    <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body class="bg-dark-bg text-white pt-24">
<div th:replace="~{fragments/owner-navbar :: ownerNavbar('cafes')}"></div>

<main class="p-8">
    <div class="mb-8 flex items-center justify-between">
        <h1 class="font-orbitron text-4xl font-bold text-neon-purple">Manage PCs</h1>
        <div class="flex gap-3">
            <a th:href="@{/owner/cafes}" class="rounded-lg border border-neon-cyan/20 bg-dark-secondary px-5 py-3 font-semibold text-gray-200 hover:text-neon-cyan">Back to Cafes</a>
            <a th:href="@{/owner/addSeat/{cafeId}(cafeId=${cafeId})}" class="btn-gaming px-6 py-3 rounded-lg font-semibold text-dark-bg">Add New PC</a>
        </div>
    </div>

    <div class="bg-dark-secondary border border-neon-cyan/20 rounded-xl overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-dark-tertiary/50">
            <tr>
                <th class="p-4 font-orbitron">Seat Number</th>
                <th class="p-4 font-orbitron">Configuration</th>
                <th class="p-4 font-orbitron">Status</th>
                <th class="p-4 font-orbitron">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="pc : ${pcs}" class="border-t border-neon-cyan/10">
                <td class="p-4" th:text="${pc.seatNumber}"></td>
                <td class="p-4" th:text="${pc.configuration}"></td>
                <td class="p-4">
                    <span class="px-3 py-1 rounded-full text-sm font-semibold"
                          th:text="${pc.available}"
                          th:classappend="${pc.available == 'Available' ? 'bg-neon-green/20 text-neon-green' : (pc.available == 'Busy' ? 'bg-yellow-500/20 text-yellow-400' : 'bg-red-500/20 text-red-400')}">
                    </span>
                </td>
                <td class="p-4">
                    <div class="flex flex-wrap gap-4">
                        <a th:href="@{/owner/slots/{pcId}(pcId=${pc.id})}" class="text-neon-cyan hover:underline font-semibold">View Slots</a>
                        <a th:href="@{/owner/addSlots/{pcId}(pcId=${pc.id})}" class="text-neon-green hover:underline font-semibold">Add Slots</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script th:src="@{'/js/script.js'}" defer></script>
</body>
</html>
