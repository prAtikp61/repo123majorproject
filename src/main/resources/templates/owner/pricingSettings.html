<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {'neon-cyan':'#00ffff','neon-purple':'#8b5cf6','neon-green':'#10b981','dark-bg':'#0a0a0a','dark-secondary':'#1a1a1a'},
                }
            }
        }
    </script>
    <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body class="bg-dark-bg text-white flex">
<aside class="w-64 bg-dark-secondary h-screen sticky top-0 border-r border-neon-cyan/20 flex flex-col">
    <div class="p-6 border-b border-neon-cyan/20"><h1 class="font-orbitron font-bold text-xl text-neon-cyan text-center">OWNER PANEL</h1></div>
    <nav class="p-4 space-y-2 flex-grow">
        <a th:href="@{/owner/}" class="block py-3 px-4 rounded-lg hover:bg-neon-cyan/10 sidebar-link font-semibold">Dashboard</a>
        <a th:href="@{/owner/cafes}" class="block py-3 px-4 rounded-lg sidebar-link active font-semibold">Manage Cafes</a>
    </nav>
    <div class="p-4 border-t border-neon-cyan/20">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="w-full text-center py-3 px-4 rounded-lg bg-red-500/20 hover:bg-red-500/40 text-red-300 font-semibold">Logout</button>
        </form>
    </div>
</aside>
<main class="flex-1 p-8 space-y-8">
    <div class="flex flex-wrap gap-3 rounded-xl border border-neon-cyan/20 bg-dark-secondary p-4">
        <a th:href="@{/owner/}" class="rounded-lg bg-dark-bg px-4 py-2 font-semibold text-gray-200 hover:text-neon-cyan">Dashboard</a>
        <a th:href="@{/owner/cafes}" class="rounded-lg bg-dark-bg px-4 py-2 font-semibold text-gray-200 hover:text-neon-cyan">Manage Cafes</a>
        <a th:href="@{/owner/pricing/{cafeId}(cafeId=${cafeId})}" class="rounded-lg bg-neon-cyan/10 px-4 py-2 font-semibold text-neon-cyan">Pricing & Walk-ins</a>
    </div>
    <div class="flex items-center justify-between">
        <h1 class="font-orbitron text-4xl font-bold text-neon-purple">Dynamic Pricing Setup</h1>
        <a th:href="@{/owner/cafes}" class="btn-gaming px-6 py-3 rounded-lg font-semibold text-dark-bg">Back</a>
    </div>

    <section class="rounded-xl border border-neon-cyan/20 bg-dark-secondary p-8">
        <h2 class="mb-6 font-orbitron text-2xl text-neon-cyan">Pricing Rules</h2>
        <form th:action="@{/owner/pricing/{cafeId}(cafeId=${cafeId})}" th:object="${pricingRule}" method="post" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <input type="hidden" th:field="*{cafeId}">
            <div>
                <label class="block text-gray-300">Base Price</label>
                <input type="number" step="0.01" th:field="*{basePrice}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2" required>
            </div>
            <div>
                <label class="block text-gray-300">Low Demand Threshold</label>
                <input type="number" th:field="*{lowDemandThreshold}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2" required>
            </div>
            <div>
                <label class="block text-gray-300">High Demand Threshold</label>
                <input type="number" th:field="*{highDemandThreshold}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2" required>
            </div>
            <div>
                <label class="block text-gray-300">Low Demand Multiplier</label>
                <input type="number" step="0.01" th:field="*{lowMultiplier}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2" required>
            </div>
            <div>
                <label class="block text-gray-300">High Demand Multiplier</label>
                <input type="number" step="0.01" th:field="*{highMultiplier}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2" required>
            </div>
            <div class="md:col-span-2">
                <button type="submit" class="btn-gaming px-6 py-3 rounded-lg font-semibold text-dark-bg">Save Pricing Rules</button>
            </div>
        </form>
    </section>

    <section class="grid grid-cols-1 xl:grid-cols-2 gap-8">
        <div class="rounded-xl border border-neon-cyan/20 bg-dark-secondary p-8">
            <h2 class="mb-6 font-orbitron text-2xl text-neon-cyan">Add Offline Booking</h2>
            <form th:action="@{/owner/pricing/{cafeId}/offline-bookings(cafeId=${cafeId})}" th:object="${offlineBookingDto}" method="post" class="space-y-5">
                <div>
                    <label class="block text-gray-300">Booking Date</label>
                    <input type="date" th:field="*{bookingDate}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2" required>
                </div>
                <div>
                    <label class="block text-gray-300">Time Slot (Hour)</label>
                    <input type="number" min="0" max="23" th:field="*{timeSlot}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2" required>
                </div>
                <div>
                    <label class="block text-gray-300">Walk-in Count</label>
                    <input type="number" min="1" th:field="*{customerCount}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2" required>
                </div>
                <div>
                    <label class="block text-gray-300">Notes</label>
                    <input type="text" th:field="*{notes}" class="mt-2 w-full rounded-lg border border-neon-cyan/30 bg-dark-bg px-4 py-2" placeholder="Optional">
                </div>
                <button type="submit" class="btn-gaming px-6 py-3 rounded-lg font-semibold text-dark-bg">Save Walk-in</button>
            </form>
        </div>

        <div class="rounded-xl border border-neon-cyan/20 bg-dark-secondary p-8">
            <h2 class="mb-6 font-orbitron text-2xl text-neon-cyan">Recent Offline Bookings</h2>
            <div class="space-y-3" th:if="${!#lists.isEmpty(recentOfflineBookings)}">
                <div th:each="entry : ${recentOfflineBookings}" class="rounded-lg border border-neon-cyan/10 bg-dark-bg px-4 py-3">
                    <div class="flex justify-between text-sm">
                        <span th:text="${entry.bookingDate}">2026-03-21</span>
                        <span th:text="${entry.timeSlot + ':00'}">18:00</span>
                    </div>
                    <div class="mt-2 font-semibold text-neon-cyan" th:text="${entry.customerCount + ' walk-ins'}">3 walk-ins</div>
                    <div class="mt-1 text-sm text-gray-400" th:text="${entry.notes}">Tournament crowd</div>
                </div>
            </div>
            <p th:if="${#lists.isEmpty(recentOfflineBookings)}" class="text-gray-400">No walk-in bookings recorded yet.</p>
        </div>
    </section>
</main>
<script th:src="@{'/js/script.js'}" defer></script>
</body>
</html>
