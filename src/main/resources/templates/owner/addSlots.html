<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Slots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {'neon-cyan':'#00ffff','neon-purple':'#8b5cf6','dark-bg':'#0a0a0a','dark-secondary':'#1a1a1a'},
                }
            }
        }
    </script>
    <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body class="bg-dark-bg text-white pt-24">
<div th:replace="~{fragments/owner-navbar :: ownerNavbar('cafes')}"></div>

<main class="p-8">
    <div class="mb-8 flex items-center justify-between">
        <h1 class="font-orbitron text-4xl font-bold text-neon-purple">Add Slots for PC</h1>
        <a th:href="@{/owner/slots/{pcId}(pcId=${pcId})}" class="rounded-lg border border-neon-cyan/20 bg-dark-secondary px-5 py-3 font-semibold text-gray-200 hover:text-neon-cyan">Back to Slots</a>
    </div>

    <form th:action="@{/owner/addSlots/{pcId}(pcId=${pcId})}" th:object="${slotDto}" method="post" class="max-w-xl mx-auto bg-dark-secondary p-8 rounded-xl border border-neon-purple/20 space-y-6">
        <div id="slots-container" class="space-y-4">
            <label class="block text-gray-300">Slot Start Times</label>
            <div class="flex items-center gap-4 slot-row">
                <input type="time" name="startTime" class="w-full mt-2 px-4 py-2 bg-dark-bg border border-neon-cyan/30 rounded-lg focus:outline-none focus:border-neon-cyan" required>
                <button type="button" class="bg-red-500/50 text-white font-bold py-2 px-4 rounded" onclick="removeSlot(this)">Remove</button>
            </div>
        </div>
        <div class="flex gap-4 pt-4">
            <button type="button" class="w-full bg-blue-500/50 py-3 rounded-lg font-semibold text-white text-lg" onclick="addSlot()">Add Another Slot</button>
            <button type="submit" class="w-full btn-gaming py-3 rounded-lg font-semibold text-dark-bg text-lg">Save Slots</button>
        </div>
    </form>
</main>

<script>
    function addSlot() {
        const container = document.getElementById('slots-container');
        const newSlot = document.createElement('div');
        newSlot.className = 'flex items-center gap-4 slot-row';
        newSlot.innerHTML = `
            <input type="time" name="startTime" class="w-full mt-2 px-4 py-2 bg-dark-bg border border-neon-cyan/30 rounded-lg focus:outline-none focus:border-neon-cyan" required>
            <button type="button" class="bg-red-500/50 text-white font-bold py-2 px-4 rounded" onclick="removeSlot(this)">Remove</button>
        `;
        container.appendChild(newSlot);
    }

    function removeSlot(button) {
        const container = document.getElementById('slots-container');
        if (container.children.length > 2) {
            button.parentElement.remove();
        }
    }
</script>
<script th:src="@{'/js/script.js'}" defer></script>
</body>
</html>
