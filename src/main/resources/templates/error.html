<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-cyan': '#00ffff',
                        'neon-purple': '#8b5cf6',
                        'neon-green': '#10b981',
                        'dark-bg': '#0a0a0a',
                        'dark-secondary': '#1a1a1a'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body class="min-h-screen bg-dark-bg text-white">
<main class="mx-auto flex min-h-screen max-w-3xl items-center px-6 py-16">
    <section class="w-full rounded-2xl border border-neon-cyan/20 bg-dark-secondary p-10 shadow-2xl">
        <p class="font-orbitron text-sm uppercase tracking-[0.35em] text-neon-cyan">System Notice</p>
        <h1 class="mt-4 font-orbitron text-4xl font-bold text-neon-purple" th:text="${errorTitle ?: 'Something went wrong'}">Something went wrong</h1>
        <p class="mt-6 text-lg text-gray-300" th:text="${errorMessage ?: 'Please go back and try again.'}">Please go back and try again.</p>

        <div class="mt-8 grid gap-4 rounded-xl border border-white/10 bg-dark-bg p-5 text-sm text-gray-400">
            <div class="flex justify-between gap-4">
                <span>Status</span>
                <span class="font-semibold text-white" th:text="${statusCode ?: 500}">500</span>
            </div>
            <div class="flex justify-between gap-4">
                <span>Path</span>
                <span class="max-w-[60%] truncate text-right font-semibold text-white" th:text="${requestPath ?: '/'}">/</span>
            </div>
        </div>

        <div class="mt-8 flex flex-wrap gap-4">
            <button onclick="history.back()" class="rounded-lg border border-neon-cyan/20 bg-dark-bg px-5 py-3 font-semibold text-gray-200 hover:text-neon-cyan">Go Back</button>
            <a th:href="@{/landing}" class="btn-gaming rounded-lg px-6 py-3 font-semibold text-dark-bg">Go to Landing</a>
        </div>
    </section>
</main>
</body>
</html>
