<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body class="min-h-screen bg-dark-bg text-white flex items-center justify-center p-6">
    <main class="w-full max-w-xl rounded-2xl border border-red-400/30 bg-dark-secondary p-8 shadow-2xl">
        <h1 class="text-3xl font-bold text-red-300 mb-4">Payment Error</h1>
        <p class="text-gray-200 mb-6" th:text="${error}">Payment could not be completed. Please try again.</p>
        <div class="flex gap-4">
            <a th:href="@{/user/findcafe}" class="rounded-lg bg-cyan-400 px-5 py-3 font-semibold text-black">Back To Cafes</a>
            <a th:href="@{/landing}" class="rounded-lg border border-white/20 px-5 py-3 font-semibold text-white">Home</a>
        </div>
    </main>
</body>
</html>
