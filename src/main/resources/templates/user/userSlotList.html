<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Slots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-cyan': '#00ffff',
                        'neon-purple': '#8b5cf6',
                        'neon-green': '#10b981',
                        'dark-bg': '#0a0a0a',
                        'dark-secondary': '#1a1a1a',
                        'dark-tertiary': '#2a2a2a'
                    }
                }
            }
        }
    </script>
    <style>
        .booking-date-input {
            width: 100%;
            min-width: 260px;
            border-radius: 14px;
            border: 1px solid rgba(0, 255, 255, 0.22);
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(28, 28, 28, 0.95));
            color: #fff;
            padding: 0.9rem 1rem;
            box-shadow: inset 0 0 0 1px rgba(139, 92, 246, 0.08);
        }

        .booking-date-input:focus {
            outline: none;
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 0 4px rgba(0, 255, 255, 0.08);
        }

        .flatpickr-calendar {
            background: #121212;
            border: 1px solid rgba(0, 255, 255, 0.24);
            border-radius: 18px;
            color: #f8fafc;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.48);
        }

        .flatpickr-calendar.arrowTop:before,
        .flatpickr-calendar.arrowTop:after {
            border-bottom-color: #121212;
        }

        .flatpickr-months {
            padding: 10px 10px 0;
        }

        .flatpickr-current-month {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #00ffff;
        }

        .flatpickr-current-month .flatpickr-monthDropdown-months {
            min-width: 132px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            font-weight: 700;
            padding: 6px 10px;
        }

        .flatpickr-current-month input.cur-year {
            color: #ffffff;
            font-weight: 700;
        }

        .flatpickr-current-month .numInputWrapper {
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
        }

        .flatpickr-current-month .numInputWrapper span.arrowUp:after {
            border-bottom-color: #00ffff;
        }

        .flatpickr-current-month .numInputWrapper span.arrowDown:after {
            border-top-color: #00ffff;
        }

        .flatpickr-weekdays {
            margin: 8px 10px 0;
            padding: 6px 4px;
            border-radius: 12px;
            background: rgba(0, 255, 255, 0.08);
            border: 1px solid rgba(0, 255, 255, 0.12);
        }

        span.flatpickr-weekday {
            color: #c4b5fd;
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .flatpickr-days {
            padding: 10px;
        }

        .flatpickr-day {
            color: #e5e7eb;
            border-radius: 10px;
            height: 38px;
            line-height: 38px;
            max-width: 38px;
        }

        .flatpickr-day:hover {
            background: rgba(139, 92, 246, 0.18);
            border-color: rgba(139, 92, 246, 0.18);
        }

        .flatpickr-day.selected,
        .flatpickr-day.startRange,
        .flatpickr-day.endRange {
            background: linear-gradient(135deg, #8b5cf6, #00ffff);
            border-color: transparent;
            color: #08111f;
            font-weight: 800;
        }

        .flatpickr-day.today {
            border-color: #10b981;
            color: #10b981;
        }

        .flatpickr-day.flatpickr-disabled,
        .flatpickr-day.flatpickr-disabled:hover,
        .flatpickr-day.prevMonthDay,
        .flatpickr-day.nextMonthDay {
            color: rgba(148, 163, 184, 0.35);
        }

        .flatpickr-months .flatpickr-prev-month,
        .flatpickr-months .flatpickr-next-month {
            border-radius: 10px;
            padding: 6px;
            top: 10px;
        }

        .flatpickr-months .flatpickr-prev-month:hover svg,
        .flatpickr-months .flatpickr-next-month:hover svg {
            fill: #8b5cf6;
        }
    </style>
    <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body class="bg-dark-bg text-white font-rajdhani overflow-x-hidden">
<nav class="fixed top-0 w-full bg-dark-secondary/90 backdrop-blur-md border-b border-neon-cyan/20 z-50">
    <div class="container mx-auto px-6 py-4 flex items-center justify-between">
        <a th:href="@{'/landing'}" class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-gradient-to-r from-neon-purple to-neon-cyan rounded-lg flex items-center justify-center">
                <span class="font-orbitron font-bold text-lg">PS</span>
            </div>
            <span class="font-orbitron font-bold text-xl text-neon-cyan">Smart PS Lounge</span>
        </a>
        <button onclick="history.back()" class="btn-gaming px-6 py-2 text-white font-semibold rounded-lg">Back</button>
    </div>
</nav>

<header class="pt-32 pb-10 bg-dark-secondary text-center">
    <h1 class="font-orbitron text-5xl font-bold text-neon-purple">Available Time Slots</h1>
    <p class="mt-2 text-lg text-gray-300">PC <span th:text="${pcId}" class="text-neon-cyan font-bold"></span></p>
</header>

<main class="container mx-auto px-6 py-10">
    <div class="mb-6 flex flex-wrap gap-3 rounded-xl border border-neon-cyan/20 bg-dark-secondary p-4">
        <a th:href="@{'/landing'}" class="rounded-lg bg-dark-bg px-4 py-2 font-semibold text-gray-200 hover:text-neon-cyan">Home</a>
        <a th:href="@{'/user/findcafe'}" class="rounded-lg bg-dark-bg px-4 py-2 font-semibold text-gray-200 hover:text-neon-cyan">All Cafes</a>
        <button type="button" onclick="history.back()" class="rounded-lg bg-neon-cyan/10 px-4 py-2 font-semibold text-neon-cyan">Previous Page</button>
    </div>
    <div th:if="${errorMessage}" class="mb-6 rounded-lg border border-red-500 bg-red-500/10 px-4 py-3 text-red-300">
        <strong>Oops!</strong>
        <span th:text="${errorMessage}">Slot could not be booked.</span>
    </div>

    <form method="get" class="mb-8 flex flex-wrap items-end gap-4 rounded-xl border border-neon-cyan/20 bg-dark-secondary p-5">
        <div>
            <label for="bookingDate" class="mb-2 block text-sm font-semibold text-gray-300">Booking Date</label>
            <input id="bookingDate" name="date" type="text" th:value="${selectedDate}" th:attr="data-min-date=${minimumBookingDate}" class="booking-date-input" placeholder="Select booking date" autocomplete="off">
        </div>
        <button type="submit" class="btn-gaming rounded-lg px-6 py-2 font-semibold">Check Availability</button>
    </form>

    <div th:if="${#lists.isEmpty(slots)}" class="rounded-xl border border-neon-cyan/20 bg-dark-secondary p-10 text-center">
        <div class="mb-4 text-5xl">PS</div>
        <h2 class="mb-2 text-2xl font-bold text-gray-300">No Slots Available</h2>
        <p class="text-gray-500">Try another date or select a different PC.</p>
    </div>

    <div th:unless="${#lists.isEmpty(slots)}" class="grid grid-cols-2 gap-4 md:grid-cols-4 lg:grid-cols-6">
        <div th:each="slot : ${slots}">
            <form th:action="@{/bookings/create-hold}" method="post" class="h-full">
                <input type="hidden" name="slotId" th:value="${slot.id}">
                <input type="hidden" name="bookingDate" th:value="${selectedDate}">
                <button type="submit"
                        class="h-full w-full rounded-xl border-2 px-4 py-5 text-center transition-all duration-300"
                        th:classappend="${slot.booked} ? ' border-red-500/30 bg-gray-700/50 text-gray-400 cursor-not-allowed' : ' border-neon-green/30 bg-dark-secondary hover:border-neon-green hover:-translate-y-1'"
                        th:disabled="${slot.booked}">
                    <div class="text-lg font-bold text-neon-cyan" th:text="${#temporals.format(slot.startTime[0], 'HH:mm')}">10:00</div>
                    <div class="text-xs text-gray-400">to</div>
                    <div class="text-lg font-bold text-neon-cyan" th:text="${#temporals.format(slot.endTime, 'HH:mm')}">11:00</div>
                    <div class="mt-3 text-sm font-semibold" th:text="${slot.booked ? 'Booked' : 'Available'}"></div>
                </button>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const bookingDateInput = document.getElementById('bookingDate');
        if (!bookingDateInput) {
            return;
        }

        flatpickr(bookingDateInput, {
            dateFormat: 'Y-m-d',
            altInput: true,
            altFormat: 'd M, Y',
            defaultDate: bookingDateInput.value || null,
            minDate: bookingDateInput.dataset.minDate,
            disableMobile: true,
            monthSelectorType: 'dropdown',
            onReady: function (selectedDates, dateStr, instance) {
                if (instance.altInput) {
                    instance.altInput.classList.add('booking-date-input');
                }
            }
        });
    });
</script>
<script th:src="@{'/js/script.js'}" defer></script>
</body>
</html>
